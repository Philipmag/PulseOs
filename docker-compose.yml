# Local development infrastructure (Phase 6).
# Production uses managed equivalents: Neon, Upstash, Cloudflare R2, Temporal Cloud.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: pulseos
      POSTGRES_PASSWORD: pulseos
      POSTGRES_DB: pulseos
    ports:
      - "5432:5432"
    volumes:
      - ./.volumes/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulseos"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - ./.volumes/redis:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./.volumes/minio:/data

  temporal:
    image: temporalio/auto-setup:1.25
    depends_on:
      - postgres
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=pulseos
      - POSTGRES_PWD=pulseos
      - POSTGRES_SEEDS=postgres
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.31.2
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - "8080:8080"
